        # Generated by tsquery-parser-codegen - DO NOT EDIT
        ApiReductionQueryDatasource:
            type: object
            required:
                - type
                - reductionType
                - multiDatasource
                - fieldMeta
            properties:
                type:
                    type: string
                    enum:
                        - reduction
                reductionType:
                    $ref: '#/components/schemas/ApiReductionType'
                aligner:
                    description: |
                        Optional alignment configuration. When provided, inner datasources are aligned
                        before reduction. When omitted, data is assumed to be already aligned.
                        Required when emptyDatasourceValue is set (to generate aligned timestamps).
                    $ref: '#/components/schemas/ApiAlignerFilter'
                multiDatasource:
                    $ref: '#/components/schemas/ApiMultiDatasource'
                fieldMeta:
                    $ref: '#/components/schemas/ApiAddFieldMeta'
                emptyDatasourceValue:
                    description: |
                        Optional fallback value to use when the multiDatasource yields zero datasources.
                        If not provided and zero datasources are found, an error is returned (current behavior).
                        If provided, this field value is executed and its result is used as the reduction output.
                        Common use cases: constant(0, integer) for sum, nil(decimal) for nullable result.
                    $ref: '#/components/schemas/ApiQueryFieldValue'
                includePartial:
                    type: boolean
                    description: |
                        When true, timestamps where only some datasources have data still produce
                        a reduced result from the available values (full-join semantics). Missing
                        datasources are skipped rather than causing the entire row to be dropped.
                        When false (default), a reduced row is only produced when ALL datasources
                        have data at that timestamp (inner-join semantics).
