openapi: 3.2.0
info:
    title: Shpanstream Time Series Query API
    version: "0.1"
paths:
    /api/commands/execute-query:
        post:
            tags:
                - tsQuery
            description: Execute time series query
            operationId: executeQuery
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ApiExecuteQueryCommandArgs'
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiQueryResult'
    /api/commands/execute-aggregation:
        post:
            tags:
                - tsQuery
            description: Execute aggregation - collapse a time series stream to scalar values
            operationId: executeAggregation
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ApiExecuteAggregationCommandArgs'
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiAggregationResult'
components:
    schemas:
        ApiExecuteQueryCommandArgs:
            type: object
            required:
                - datasource
                - from
                - to
            properties:
                datasource:
                    $ref: '#/components/schemas/ApiQueryDatasource'
                from:
                    type: string
                    format: date-time
                to:
                    type: string
        ApiExecuteAggregationCommandArgs:
            type: object
            required:
                - aggregation
                - from
                - to
            properties:
                aggregation:
                    $ref: '#/components/schemas/ApiAggregation'
                from:
                    type: string
                    format: date-time
                to:
                    type: string
                    format: date-time
        # Generated by tsquery-parser-codegen - DO NOT EDIT
        ApiQueryDatasource:
            description: Datasource for query. datasource can either be a source of data (e.g. from a database or api) or a manipulation of data (e.g. filtered, reduction, etc.)
            type: object
            discriminator:
                propertyName: type
                mapping:
                    filtered: '#/components/schemas/ApiFilteredQueryDatasource' # Managed by tsquery-parser-codegen
                    fromReport: '#/components/schemas/ApiFromReportQueryDatasource' # Managed by tsquery-parser-codegen
                    postgres: '#/components/schemas/ApiPostgresQueryDatasource'
                    reduction: '#/components/schemas/ApiReductionQueryDatasource' # Managed by tsquery-parser-codegen
                    static: '#/components/schemas/ApiStaticQueryDatasource' # Managed by tsquery-parser-codegen
            oneOf:
                # Managed by tsquery-parser-codegen
                - $ref: '#/components/schemas/ApiFilteredQueryDatasource'
                # Managed by tsquery-parser-codegen
                - $ref: '#/components/schemas/ApiFromReportQueryDatasource'
                - $ref: '#/components/schemas/ApiPostgresQueryDatasource'
                # Managed by tsquery-parser-codegen
                - $ref: '#/components/schemas/ApiReductionQueryDatasource'
                # Managed by tsquery-parser-codegen
                - $ref: '#/components/schemas/ApiStaticQueryDatasource'
        ApiPostgresQueryDatasource:
            type: object
            description: Postgres datasource that queries time series data from a PostgreSQL table
            required:
                - type
                - connectionString
                - tableName
                - fieldName
                - timestampFieldName
                - fieldMeta
            properties:
                type:
                    type: string
                    enum:
                        - postgres
                connectionString:
                    type: string
                    description: PostgreSQL connection string
                tableName:
                    type: string
                    description: Name of the table to query
                fieldName:
                    type: string
                    description: Name of the value column
                timestampFieldName:
                    type: string
                    description: Name of the timestamp column
                fieldMeta:
                    $ref: '#/components/schemas/ApiQueryFieldMeta'
        # Generated by tsquery-parser-codegen - DO NOT EDIT
        ApiMeasurementValue:
            type: object
