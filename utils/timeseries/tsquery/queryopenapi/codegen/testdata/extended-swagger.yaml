        ApiDeltaFilter:
            type: object
            description: |
                Delta filter computes the difference between consecutive values (current - previous). Requires numeric, required field.
                When nonNegative is true, the filter handles counter resets: if the current value is negative, the point is dropped;
                if the current value is less than the previous (reset detected), the delta is clamped to 0. Set emitOnReset to true
                to instead emit the current value as the delta (assuming reset from zero). If maxCounterValue is set, the delta is
                (maxCounterValue - previous + current) to handle counter wraparound.
            required:
                - type
            properties:
                type:
                    type: string
                    enum:
                        - delta
                nonNegative:
                    type: boolean
                    description: When true, handles counter resets by clamping negative deltas. Decreases are treated as counter resets. By default, when a decrease is detected the delta is clamped to 0. Set emitOnReset to true to instead emit the current value as the delta (useful when actual counter resets are expected).
                    x-go-type-skip-optional-pointer: true
                maxCounterValue:
                    type: number
                    format: double
                    description: Maximum counter value for wraparound detection. Only used when nonNegative is true. When set, counter resets compute delta as (maxCounterValue - previous + current).
                    x-go-type-skip-optional-pointer: true
                emitOnReset:
                    type: boolean
                    description: Only used when nonNegative is true. When false (default), a decrease in value emits 0 as the delta, which is safe for glitchy counters. When true, a decrease emits the current value as the delta, assuming the counter reset from zero. Mutually exclusive with maxCounterValue.
                    x-go-type-skip-optional-pointer: true
        # Generated by tsquery-parser-codegen - DO NOT EDIT
        ApiRateFilter:
            type: object
            description: Rate filter computes the rate of change (delta / time_diff_in_seconds). Requires numeric, required field. Output is always decimal.
            required:
                - type
            properties:
                type:
                    type: string
                    enum:
                        - rate
                overrideUnit:
